<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador.</p>
    <picture>
        <source media="(max-width: 750px)" srcset="Imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1000px)" srcset="Imagens/foto-m.png" type="image/png">
        <img src="Imagens/foto-g.png" alt="Imagem Flexível">
    </picture>
    <h1>Reproduzinho Áudio</h1>
    <p>Vamos aprender a repoduzir áudios em HTML5.</p>
    <audio preload="metadata" src="midia/Daloka - Summer Vibes.mp3" controls autoplay loop></audio>
    <p>Infelizmente seu navegador não consegue repoduzir áudio. <a href="midia/Daloka - Summer Vibes.mp3">Clique aqui para baixar o arquivo MP3</a></p>
    
</body>
</html>
